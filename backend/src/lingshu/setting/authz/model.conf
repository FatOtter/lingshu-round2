# P2: RBAC + Resource-Level Permissions
[request_definition]
r = sub, obj, act, res

[policy_definition]
p = sub, obj, act, res

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) && (p.obj == "*" || r.obj == p.obj) && (p.act == "*" || r.act == p.act) && (p.res == "*" || r.res == p.res)
