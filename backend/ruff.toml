target-version = "py312"
line-length = 100
src = ["src", "tests"]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    # "TCH",  # flake8-type-checking (disabled: too aggressive for DI-heavy codebase)
    "RUF",  # ruff-specific
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults (FastAPI Depends)
]

[lint.isort]
known-first-party = ["lingshu"]

[format]
quote-style = "double"
indent-style = "space"
