[mypy]
python_version = 3.12
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
plugins = pydantic.mypy

[mypy-neo4j.*]
ignore_missing_imports = true

[mypy-casbin.*]
ignore_missing_imports = true

[mypy-passlib.*]
ignore_missing_imports = true

[mypy-authlib.*]
ignore_missing_imports = true

[mypy-asyncpg.*]
ignore_missing_imports = true

[pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
