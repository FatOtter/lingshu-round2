# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    build:
      target: builder
    volumes:
      - ../backend/src:/app/src
      - ../backend/alembic:/app/alembic
      - ../backend/alembic.ini:/app/alembic.ini
    command: ["uvicorn", "lingshu.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      LINGSHU_SERVER_ENV: "development"
      LINGSHU_AUTH_MODE: "dev"

  frontend:
    build:
      target: deps
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: ["pnpm", "dev"]
    environment:
      NODE_ENV: development
